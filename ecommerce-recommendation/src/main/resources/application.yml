server:
  port: 8004
  servlet:
    context-path: /recommend

spring:
  application:
    name: ecommerce-recommendation
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 4
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 20
          max-wait: 2000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  cloud:
    stream:
      rocketmq:
        binder:
          name-server: localhost:9876
      bindings:
        user-behavior-in:
          destination: user-behavior-topic
          content-type: application/json
          group: recommendation-group
        hot-product-in:
          destination: hot-product-topic
          content-type: application/json
          group: recommendation-hot-group

recommendation:
  cache:
    local-max-size: 10000
    local-expire-seconds: 60
    redis-expire-seconds: 300
  recommend:
    default-size: 10
    max-size: 50
    hot-refresh-seconds: 60
    user-recommend-expire-hours: 2

knife4j:
  enable: true
  openapi:
    title: Recommendation Service API
    description: 智能推荐引擎服务
    version: 1.0.0
