server:
  port: 8003
  servlet:
    context-path: /order

spring:
  application:
    name: ecommerce-order
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ecommerce_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  cloud:
    stream:
      rocketmq:
        binder:
          name-server: localhost:9876
      bindings:
        order-create-out:
          destination: order-create-topic
          content-type: application/json
        order-create-in:
          destination: order-create-topic
          content-type: application/json
          group: order-create-group
        order-cancel-out:
          destination: order-cancel-topic
          content-type: application/json
        order-pay-success-in:
          destination: pay-success-topic
          content-type: application/json
          group: order-pay-group

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ecommerce.platform.order.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: Order Service API
    description: 订单服务
    version: 1.0.0

order:
  token-prefix: order:token:
  token-expire-minutes: 30
  auto-cancel-minutes: 30
