server:
  port: 8080

spring:
  application:
    name: ecommerce-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: ecommerce-iam
          uri: http://localhost:8001
          predicates:
            - Path=/iam/**
        - id: ecommerce-product
          uri: http://localhost:8002
          predicates:
            - Path=/product/**
        - id: ecommerce-order
          uri: http://localhost:8003
          predicates:
            - Path=/order/**
        - id: ecommerce-recommendation
          uri: http://localhost:8004
          predicates:
            - Path=/recommend/**
        - id: ecommerce-approval
          uri: http://localhost:8005
          predicates:
            - Path=/approval/**
        - id: ecommerce-analytics
          uri: http://localhost:8006
          predicates:
            - Path=/analytics/**
        - id: ecommerce-notification
          uri: http://localhost:8007
          predicates:
            - Path=/notification/**
        - id: ecommerce-payment
          uri: http://localhost:8008
          predicates:
            - Path=/payment/**
        - id: ecommerce-audit
          uri: http://localhost:8009
          predicates:
            - Path=/audit/**

gateway:
  auth:
    exclude-paths:
      - /iam/auth/login
      - /iam/auth/captcha
      - /iam/health
      - /product/health
      - /order/health
      - /recommend/health
      - /approval/health
      - /analytics/health
      - /notification/health
      - /payment/health
      - /audit/health
      - /payment/callback/**
      - /payment/logistics/callback/**
  rate-limit:
    enabled: true
    default-limit-per-second: 500
    burst-capacity: 1000
  trace:
    enabled: true
    header-name: X-Trace-Id

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: false
      version: openapi3
